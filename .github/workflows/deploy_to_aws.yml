name: Deploy to EC2

on:
  push:
    branches: [master]
env:
  DATABASE_URL: ${{ secrets.DATABASE_URL }}
  AUTH_SECRET: ${{ secrets.AUTH_SECRET }}
  NEXTAUTH_URL: https://notification-center.modernstacks.net
  NEXT_PUBLIC_APP_URL: https://notification-center.modernstacks.net
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: ${{ secrets.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}
  VAPID_PRIVATE_KEY: ${{ secrets.VAPID_PRIVATE_KEY }}
  VAPID_SUBJECT: ${{ secrets.VAPID_SUBJECT }}
  EC2_HOST: ${{ secrets.EC2_HOST }}
  EC2_KEY: ${{ secrets.EC2_KEY }}
  DOCKER_TOKEN: ${{ secrets.DOCKER_TOKEN }}
  AUTH_GOOGLE_ID: ${{ secrets.AUTH_GOOGLE_ID }}
  AUTH_GOOGLE_SECRET: ${{ secrets.AUTH_GOOGLE_SECRET }}
  AUTH_GITHUB_ID: ${{ secrets.AUTH_GITHUB_CLIENT_ID }}
  AUTH_GITHUB_SECRET: ${{ secrets.AUTH_GITHUB_CLIENT_SECRET }} 

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: ${{ github.ref_name == 'master' && 'production' || 'development' }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install dependencies
        run: npm ci
      - name: Generate Prisma Client
        run: npx prisma generate
      - name: Build
        run: npm run build
      # 4. Run E2E tests

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 2
        

      - name: Set short SHA version
        id: vars
        run: |
          echo "CICD_VERSION=${GITHUB_SHA:0:4}" >> $GITHUB_OUTPUT

      - name: Build Docker image
        run: |
          docker build \
          --build-arg DATABASE_URL=${{env.DATABASE_URL}} \
          --build-arg NEXT_PUBLIC_VAPID_PUBLIC_KEY="${{env.NEXT_PUBLIC_VAPID_PUBLIC_KEY}}" \
          --build-arg NEXT_PUBLIC_APP_URL="${{env.NEXT_PUBLIC_APP_URL}}" \
          -t zina662/realtime-notifications-center:${{steps.vars.outputs.CICD_VERSION}} .

      - name: Login to Docker Hub
        run: |
          echo "${{ env.DOCKER_TOKEN }}" | docker login -u zina662 --password-stdin
      - name: Testing enviroment
        run: echo "NEXT_PUBLIC_VAPID_PUBLIC_KEY = ${{ env.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}"   
      - name: Push image
        run: |
          docker push zina662/realtime-notifications-center:${{steps.vars.outputs.CICD_VERSION}}

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.0.0
        with:
          host: ${{ env.EC2_HOST }}
          username: ec2-user
          key: ${{ env.EC2_KEY }}
          script: |
            docker pull zina662/realtime-notifications-center:${{steps.vars.outputs.CICD_VERSION}}
            docker stop realtime-notification-center || true
            docker rm realtime-notification-center || true
            docker run -d \
            -p 80:3000 \
            -e DATABASE_URL="${{ env.DATABASE_URL }}" \
            -e AUTH_SECRET="${{ env.AUTH_SECRET }}" \
            -e NEXTAUTH_URL=${{env.NEXTAUTH_URL}} \
            -e NEXT_PUBLIC_APP_URL="${{env.NEXT_PUBLIC_APP_URL}}" \
            -e NEXT_PUBLIC_VAPID_PUBLIC_KEY="${{ env.NEXT_PUBLIC_VAPID_PUBLIC_KEY }}" \
            -e VAPID_PRIVATE_KEY="${{ env.VAPID_PRIVATE_KEY }}" \
            -e VAPID_SUBJECT="${{ env.VAPID_SUBJECT }}" \
            -e AUTH_GOOGLE_ID="${{ env.AUTH_GOOGLE_ID }}" \
            -e AUTH_GOOGLE_SECRET="${{ env.AUTH_GOOGLE_SECRET }}" \
            -e AUTH_GITHUB_ID="${{ env.AUTH_GITHUB_ID }}" \
            -e AUTH_GITHUB_SECRET="${{ env.AUTH_GITHUB_SECRET }}" \
            --name realtime-notification-center \
            zina662/realtime-notifications-center:${{steps.vars.outputs.CICD_VERSION}}
